<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOYO — 모여</title>
  <script>
    // GitHub Pages 404 redirect for single-page apps
    // This script redirects 404s to index.html with the original path preserved
    const pathSegments = location.pathname.split('/').filter(Boolean);
    
    // Extract the repository name (moyo_) and remove it from segments
    const repoName = 'moyo_';
    if (pathSegments[0] === repoName) {
      pathSegments.shift();
    }
    
    // Reconstruct the path and redirect to index.html
    const redirectPath = '/' + repoName + '/?' + pathSegments.join('/');
    location.replace(redirectPath);
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
